# GPU Manager client registry
#
# Fields:
#   service           systemd unit name (nullable if start/stop is a shell cmd)
#   default_vram_mb   baseline VRAM budget in MiB
#   priority          critical | high | normal | idle
#   preemptible       bool — can this client be preempted by higher-priority leases?
#   cpu_contention    bool (NEW) — client pins significant CPU; pause when a
#                     priority >= normal lease is acquired, unpause on release.
#                     Defaults to false when absent. Backwards-compatible.
#   start_command     shell command to launch
#   stop_command      shell command to fully stop
#   pause_command     (NEW) shell command to pause without tearing down
#   unpause_command   (NEW) shell command to resume a paused client
#   health_check      HTTP URL returning 200 when healthy
#   startup_seconds   max wait window for health to come up
#   callback_url      webhook the manager POSTs to on preemption
#   description       human-readable label
#
# NOTE: /home/aidin/sglang-vision-launch.sh is deployed on aidin (outside this
# repo). Operator responsibility. Captures the exact `docker run` invocation
# for sglang-vision (Qwen2.5-VL-7B-Instruct-AWQ on cuda:1, port 8002).

clients:
  vllm:
    service: null
    default_vram_mb: 29000
    priority: idle
    preemptible: true
    cpu_contention: true
    start_command: "/home/aidin/sglang-launch.sh"
    stop_command: "docker stop sglang-llm; docker rm sglang-llm"
    pause_command: "docker pause sglang-llm"
    unpause_command: "docker unpause sglang-llm"
    health_check: "http://localhost:8001/v1/models"
    startup_seconds: 180
    model_env_file: "/home/aidin/.config/vllm/model.env"
    model_env_var: "VLLM_MODEL"
    description: "SGLang LLM inference (Docker, Blackwell)"

  sglang-vision:
    service: null
    default_vram_mb: 16000
    priority: idle
    preemptible: true
    cpu_contention: true
    start_command: "/home/aidin/sglang-vision-launch.sh"
    stop_command: "docker stop sglang-vision; docker rm sglang-vision"
    pause_command: "docker pause sglang-vision"
    unpause_command: "docker unpause sglang-vision"
    health_check: "http://localhost:8002/v1/models"
    startup_seconds: 180
    description: "SGLang Vision (Qwen2.5-VL-7B-Instruct-AWQ, Blackwell) for caption + photo analysis"

  benchmarker:
    service: null
    default_vram_mb: 40000
    priority: high
    preemptible: false
    start_command: "/home/aidin/sglang-bench-launch.sh"
    stop_command: "docker stop sglang-bench; docker rm sglang-bench"
    health_check: "http://localhost:8002/v1/models"
    startup_seconds: 180
    model_env_file: "/home/aidin/.config/vllm/model.env"
    model_env_var: "VLLM_MODEL"
    description: "Sovereign Benchmarker — large models (separate container)"

  nosonix:
    service: null
    default_vram_mb: 4000
    priority: normal
    preemptible: true
    callback_url: "http://localhost:8000/gpu/callback"
    health_check: "http://localhost:8000/benchmark"
    description: "noSonix Parakeet transcription"

  theear:
    service: theear-worker.service
    default_vram_mb: 8000
    priority: normal
    preemptible: true
    start_command: "sudo systemctl start theear-worker"
    stop_command: "sudo systemctl stop theear-worker"
    description: "TheEar audio analysis worker"

  ollama:
    service: ollama.service
    default_vram_mb: 4000
    priority: idle
    preemptible: true
    start_command: "sudo systemctl start ollama"
    stop_command: "sudo systemctl stop ollama"
    health_check: "http://localhost:11434/api/tags"
    description: "Ollama local LLM"

  diffusion:
    service: null
    default_vram_mb: 8000
    priority: normal
    preemptible: true
    start_command: "/home/aidin/diffusion-server/food-image-launch.sh"
    stop_command: "pkill -f 'food_image_server:app' || true"
    health_check: "http://localhost:8003/health"
    startup_seconds: 120
    description: "Food image generation (SDXL / FLUX diffusion)"

  forma-avatar:
    service: null
    default_vram_mb: 28000
    priority: normal
    preemptible: true
    callback_url: "http://localhost:8420/gpu/callback"
    health_check: "http://localhost:8420/api/health"
    start_command: "systemctl --user start forma-server"
    stop_command: "systemctl --user stop forma-server"
    startup_seconds: 180
    description: "Forma Avatar Lab — Flux Kontext + PuLID + InsightFace"

  forma-avatar-training:
    service: null
    default_vram_mb: 24000
    priority: normal
    preemptible: false
    description: "Forma Avatar LoRA training (ai-toolkit subprocess, GPU 0)"
